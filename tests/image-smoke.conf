# Per-app config for the shared image-smoke harness (tests/image-smoke.sh,
# synced from cplieger/ci). Runs the default scheduled mode (15m) on dummy
# credentials: the health marker is pure LOOP LIVENESS — set healthy on boot,
# refreshed after every loop iteration regardless of scan outcome — so the
# failing first scan (401 on the dummy token, or no network at all) does not
# flip the container unhealthy. The container HEALTHCHECK (`github-scout
# health` stats /tmp/.healthy) therefore reports healthy deterministically,
# proving the static binary runs in the distroless nonroot base, /tmp is
# writable, config loads, and the health subcommand works.
# GITHUB_OWNER/GITHUB_TOKEN must be non-empty (owner URL-safe); values are
# never validated against GitHub for the smoke verdict.
SMOKE_APP_NAME=github-scout
SMOKE_TIMEOUT=60
SMOKE_RUN_ARGS="-e GITHUB_OWNER=smoke-test -e GITHUB_TOKEN=smoke-dummy-token"
