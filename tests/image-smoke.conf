# Per-app config for the shared image-smoke harness (tests/image-smoke.sh,
# synced from cplieger/ci). Runs in resident-idle mode (SCAN_INTERVAL=off):
# main.go writes the health marker and idles WITHOUT scanning (no GitHub call),
# so the image reaches healthy on dummy credentials. Waits for the container
# HEALTHCHECK (`github-scout health` stats /tmp/.healthy) to report healthy -
# proving the static binary runs in the distroless nonroot base, /tmp is
# writable, embedded tzdata loads, and the health subcommand works.
# GITHUB_OWNER/GITHUB_TOKEN must be non-empty (owner URL-safe); values are
# unused since no scan runs.
SMOKE_APP_NAME=github-scout
SMOKE_TIMEOUT=60
SMOKE_RUN_ARGS="-e GITHUB_OWNER=smoke-test -e GITHUB_TOKEN=smoke-dummy-token -e SCAN_INTERVAL=off"
